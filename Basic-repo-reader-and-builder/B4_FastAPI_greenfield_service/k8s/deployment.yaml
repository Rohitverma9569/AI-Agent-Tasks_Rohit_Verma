apiVersion: apps/v1
kind: Deployment
metadata:
  name: b4-transaction-api
  namespace: b4
  labels:
    app.kubernetes.io/name: b4-transaction-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: b4-transaction-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: b4-transaction-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: b4-transaction-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: b4-transaction-api-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
