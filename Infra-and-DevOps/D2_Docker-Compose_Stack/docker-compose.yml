services:
  db:
    image: postgres:16-alpine
    container_name: d2-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: d2-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER:-appuser}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      DATABASE_NAME: ${POSTGRES_DB:-appdb}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: d2-worker
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER:-appuser}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      DATABASE_NAME: ${POSTGRES_DB:-appdb}
      POLL_INTERVAL_MS: "2000"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
